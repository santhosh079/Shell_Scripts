name: Install Apache on Ubuntu

on:
  push:
    branches:
      - main

jobs:
  install-apache:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update apt and install Apache
        run: |
          sudo apt-get update
          sudo apt-get install -y apache2

      - name: Verify Apache installed
        run: |
          apache2 -v