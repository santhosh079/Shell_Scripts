name: Test Project

on: push

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Get code
        uses: actions/checkout@v4

      - name: Install NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        # Using 'npm install' instead of 'npm ci' since there is no lockfile
        run: npm install

      - name: Run tests
        run: npm test