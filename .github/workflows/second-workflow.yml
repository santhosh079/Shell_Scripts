name: Test Project
on: push
jobs:
    test:
        # Fixed the typo "unbuntu" to "ubuntu"
        runs-on: ubuntu-latest
        steps:
          - name: get code
            # Upgraded from v3 to v4
            uses: actions/checkout@v4
          - name: Install NodeJS
            # Upgraded from v3 to v4
            uses: actions/setup-node@v4
            with:
              node-version: '18'
              # Added caching for faster npm installs
              cache: 'npm'
          - name: Install dependencies
            run: npm ci
          - name: Run tests
            run: npm test