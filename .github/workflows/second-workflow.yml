name: Test Project
on: push
jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - name: get code
                uses: actions/checkout@v2
            -name: Install Node.js
                uses: actions/setup-node@v2
                with:
                    node-version: '18'
            - name: install dependencies
                run: npm install
            - name: run tests
                run: npm test