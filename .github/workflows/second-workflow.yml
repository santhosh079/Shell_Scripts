name: Install npm on Ubuntu

on:
  push:
    branches:
      - main

jobs:
  install-npm:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update apt and install npm
        run: |
          sudo apt-get update
          sudo apt-get install -y npm

      - name: Verify npm installed
        run: |
          npm --version