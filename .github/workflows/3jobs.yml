name: Three jobs example

on:
  push:
    branches:
      - main

jobs:
  install-npm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install npm
        run: |
          sudo apt-get update
          sudo apt-get install -y npm

      - name: Verify npm
        run: npm --version

  install-apache:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Apache
        run: |
          sudo apt-get update
          sudo apt-get install -y apache2

      - name: Verify Apache
        run: apache2 -v

  install-curl:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install curl
        run: |
          sudo apt-get update
          sudo apt-get install -y curl

      - name: Verify curl
        run: curl --version